name: Release

# Builds the fully standalone LocalFlow.app + DMG on Apple Silicon and
# attaches it to the GitHub release. Trigger: push a tag like v1.0.0
# (or run manually from the Actions tab).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# The default GITHUB_TOKEN is read-only; creating/uploading the release
# needs write access to repo contents.
permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create build venv
        run: |
          python3 -m venv venv
          venv/bin/pip install -e ".[whispercpp,desktop,llm]"

      - name: Build standalone app + DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/build_app.sh --standalone --dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalFlow-dmg
          path: dist/LocalFlow-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/LocalFlow-*.dmg --generate-notes || gh release upload "${GITHUB_REF_NAME}" dist/LocalFlow-*.dmg
